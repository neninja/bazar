app = "jogos"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  PHX_HOST = "jogos.fly.dev"
  DATABASE_PATH = "/data/bazar.db"
  POOL_SIZE = "5"

[[mounts]]
  source = "bazar_data"
  destination = "/data"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
